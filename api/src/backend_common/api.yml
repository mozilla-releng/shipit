---
openapi: 3.0.1
info:
  title: Ship-It API
  description: 'Find  out more about Ship-it at

    [https://github.com/mozilla-releng/shipit](https://github.com/mozilla-releng/shipit)

    '
  license:
    name: MPL 2.0
    url: https://www.mozilla.org/MPL/2.0/
  version: 1.0.0
paths:
  /nightly-release:
    get:
      summary: List nightly releases
      operationId: shipit_api.public.api.list_nightly_releases
      parameters:
        - name: product
          in: query
          required: true
          schema:
            type: string
        - name: channel
          in: query
          required: true
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
        - name: buildid
          in: query
          schema:
            type: string
        - name: after_buildid
          in: query
          description: >
              Only return releases with buildid greater than this value. Feeding
              the highest buildid returned by a query using this argument into a
              new request as `after_buildid` will allow paging through entries
              in an ascending fashion.
          schema:
            type: string
        - name: before_buildid
          in: query
          description: >
              Only return releases with buildid less than this value. Feeding
              the lowest buildid returned by a query using this argument into a
              new request as `before_buildid` will allow paging through entries
              in a descending fashion.
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of releases to return.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 500
        - name: order
          in: query
          schema:
            type: string
            enum:
              - desc
              - asc
            default: desc
      responses:
        "200":
          description: A list of nightly releases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NightlyRelease'
components:
  schemas:
    NightlyRelease:
      type: object
      required:
        - product
        - channel
        - version
        - buildid
        - locales
      properties:
        product:
          type: string
          example: firefox
        channel:
          type: string
          example: nightly
        version:
          type: string
          example: 140.0a1
        buildid:
          type: string
          example: "20260522093015"
        locales:
          type: array
          items:
            type: string
            example: zh-TW
    ProductInput:
      # ProductInput handles the products we currently support on shipit
      type: string
      example: firefox
      # enum is automatically generated by backend_common
    ProductOutput:
      # ProductOutput lists all the products shipit has ever supported. They are needed
      # for API endpoints that return historical data.
      type: string
      example: firefox
      # enum is automatically generated by backend_common
