name: Auto update pre-commit hooks every month
on:
  schedule:
    - cron: '0 0 1 * *'
jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: mozilla-releng/actions/pre-commit-autoupdate@18a2262cf016abc2e14ab3da8cdf6f0f7f5f72e7 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
